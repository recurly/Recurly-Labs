name: Sync GCS object to repository

on:
  repository_dispatch:
    types: [gcs-object-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: recurly/pipeline-configs/.github/actions/auth@master
        with:
          env: prod
          setup_gcloud: true

      - name: Validate and download from GCS
        env:
          BUCKET: ${{ github.event.client_payload.bucket }}
          OBJECT: ${{ github.event.client_payload.object }}
        run: |
          if [[ "$OBJECT" == *..* || "$OBJECT" == /* ]]; then
            echo "Invalid object path: $OBJECT"
            exit 1
          fi
          mkdir -p "$(dirname "$OBJECT")"
          gcloud storage cp "gs://$BUCKET/$OBJECT" "$OBJECT"

      - name: Commit and push
        env:
          OBJECT: ${{ github.event.client_payload.object }}
          BUCKET: ${{ github.event.client_payload.bucket }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OBJECT"
          git diff --staged --quiet || git commit -m "sync: $OBJECT from $BUCKET"
          git push
